; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^8.3.9
  adafruit/DHT sensor library @ ^1.4.6

build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4          ;原为-1，改为4，连接到ESP32的RST引脚
  -D TFT_BL=21          ; 你的板子背光在GPIO 21
  -D TFT_BACKLIGHT_ON=HIGH
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SPI_FREQUENCY=55000000 ; 提升SPI频率，让刷屏更快
  -D TFT_RGB_ORDER=0    ; 尝试设为 0 (BGR) 或 1 (RGB)
  -D TFT_INVERSION_ON   ; 如果颜色是反的，加这一行
  -D DHT_PIN=27
  -I src
  -I src/ui  ; 告诉编译器去哪里找 ui.h
  -D LV_CONF_INCLUDE_SIMPLE  ; 告诉LVGL使用简单的头文件包含方式
